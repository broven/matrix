[post-create]
install = """
# env fallback: Worktrunk -> Conductor -> Superset
ROOT="${WT_ROOT:-${CONDUCTOR_ROOT_PATH:-${SUPERSET_ROOT_PATH}}}"
pnpm install
"""

ensure-dirs = "mkdir -p packages/client/dist"

copy-env = """
# env fallback: Worktrunk -> Conductor -> Superset
ROOT="${WT_ROOT:-${CONDUCTOR_ROOT_PATH:-${SUPERSET_ROOT_PATH}}}"
cp "$ROOT/.env" .env 2>/dev/null || echo 'No .env found in root, skipping'
"""

ios-init = "cd packages/client && pnpm tauri ios init 2>&1 | tail -3"

env-local = """
# env fallback: Worktrunk -> Conductor -> Superset
WORKSPACE_RAW="${WT_NAME:-${CONDUCTOR_WORKSPACE_NAME:-${SUPERSET_WORKSPACE_NAME}}}"
WORKSPACE="$(echo "$WORKSPACE_RAW" | tr ' ' '-')"

MATRIX_TOKEN=$(head -c 36 /dev/urandom | base64 | tr -d '/+=' | head -c 48)

# Ports are managed by portless at dev-time (portless run).
# Only non-port env vars are written here.
cat > .env.local << EOF
WORKSPACE_NAME="$WORKSPACE"
MATRIX_TOKEN=$MATRIX_TOKEN
VITE_MATRIX_TOKEN=$MATRIX_TOKEN
EOF

cat > .env.test.local << EOF
WORKSPACE_NAME="$WORKSPACE"
MATRIX_TOKEN=$MATRIX_TOKEN
VITE_MATRIX_TOKEN=$MATRIX_TOKEN
MATRIX_DB=./data/test.db
MATRIX_PORTLESS_NAME=test.api.matrix
MATRIX_CLIENT_PORTLESS_NAME=test.matrix
EOF
"""

