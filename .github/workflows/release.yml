name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

env:
  VERSION: ${{ github.ref_name }}

jobs:
  build-mac:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install

      - name: Build workspace packages
        run: pnpm -r build

      - name: Set version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          cd packages/client/src-tauri
          jq --arg v "$VERSION" '.version = $v' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json

      - name: Compile server sidecar
        run: |
          bun build --compile packages/server/src/index.ts \
            --outfile packages/client/src-tauri/binaries/matrix-server-aarch64-apple-darwin

      - name: Build Tauri app
        run: |
          cd packages/client
          pnpm tauri build --target aarch64-apple-darwin --bundles dmg || \
          pnpm tauri build --target aarch64-apple-darwin --bundles app

      - name: Package artifacts
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          # Try DMG first, fallback to zipped .app
          if ls packages/client/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg 2>/dev/null; then
            cp packages/client/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg .
          else
            cd packages/client/src-tauri/target/aarch64-apple-darwin/release/bundle/macos
            zip -r "Matrix_v${VERSION}_aarch64.app.zip" Matrix.app
            cp *.zip "$GITHUB_WORKSPACE/"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-artifacts
          path: |
            *.dmg
            *.app.zip

  build-linux-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect channel
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "PRERELEASE=true" >> $GITHUB_ENV
          else
            echo "PRERELEASE=false" >> $GITHUB_ENV
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install

      - name: Build workspace packages
        run: pnpm -r build

      - name: Compile server (glibc for tarball)
        run: |
          bun build --compile packages/server/src/index.ts \
            --target bun-linux-x64 \
            --outfile matrix-server

      - name: Compile server (musl for Docker)
        run: |
          bun build --compile packages/server/src/index.ts \
            --target bun-linux-x64-musl \
            --outfile matrix-server-musl

      - name: Package tarball
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          DIR="matrix-server-v${VERSION}-linux-x64"
          mkdir -p "${DIR}/web"
          cp matrix-server "${DIR}/"
          cp -r packages/client/dist/* "${DIR}/web/"
          tar czf "${DIR}.tar.gz" "${DIR}"

      - name: Build and push Docker image
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/matrix-server"

          cp matrix-server-musl matrix-server-docker
          mkdir -p docker-web
          cp -r packages/client/dist/* docker-web/

          cat > Dockerfile.ci <<'DOCKERFILE'
          FROM alpine:3.21
          RUN apk add --no-cache libstdc++
          COPY matrix-server-docker /usr/local/bin/matrix-server
          COPY docker-web/ /app/web/
          WORKDIR /app
          EXPOSE 3000
          CMD ["matrix-server", "--port", "3000", "--web", "/app/web"]
          DOCKERFILE

          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          if [ "$PRERELEASE" = "true" ]; then
            docker build -f Dockerfile.ci -t "${IMAGE}:${VERSION}" -t "${IMAGE}:beta" .
            docker push "${IMAGE}:${VERSION}"
            docker push "${IMAGE}:beta"
          else
            docker build -f Dockerfile.ci -t "${IMAGE}:${VERSION}" -t "${IMAGE}:latest" .
            docker push "${IMAGE}:${VERSION}"
            docker push "${IMAGE}:latest"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: matrix-server-v*-linux-x64.tar.gz

  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install

      - name: Build workspace packages
        run: pnpm -r build

      - name: Set version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          # iOS requires X.Y.Z format - strip pre-release suffix
          IOS_VERSION=$(echo "$VERSION" | sed 's/-.*//')
          cd packages/client/src-tauri
          jq --arg v "$IOS_VERSION" '.version = $v' tauri.conf.json > tmp.json && mv tmp.json tauri.conf.json

      - name: Create sidecar placeholder
        run: |
          mkdir -p packages/client/src-tauri/binaries
          touch packages/client/src-tauri/binaries/matrix-server-aarch64-apple-ios
          touch packages/client/src-tauri/binaries/matrix-server-aarch64-apple-ios-sim
          chmod +x packages/client/src-tauri/binaries/matrix-server-aarch64-apple-ios
          chmod +x packages/client/src-tauri/binaries/matrix-server-aarch64-apple-ios-sim

      - name: Install CocoaPods
        run: brew install cocoapods

      - name: Initialize iOS project
        run: cd packages/client && pnpm tauri ios init

      - name: Add iOS permissions
        run: |
          PLIST="packages/client/src-tauri/gen/apple/matrix-client_iOS/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Matrix needs camera access to scan QR codes'" "$PLIST"

      - name: Disable code signing
        run: |
          PBXPROJ="packages/client/src-tauri/gen/apple/matrix-client.xcodeproj/project.pbxproj"
          sed -i '' 's/CODE_SIGN_IDENTITY = ".*"/CODE_SIGN_IDENTITY = "-"/g' "$PBXPROJ"
          sed -i '' 's/DEVELOPMENT_TEAM = ".*"/DEVELOPMENT_TEAM = ""/g' "$PBXPROJ"
          # Inject signing overrides into every buildSettings block
          sed -i '' '/buildSettings = {/a\
            CODE_SIGNING_REQUIRED = NO;\
            CODE_SIGNING_ALLOWED = NO;\
          ' "$PBXPROJ"

      - name: Build iOS
        run: |
          cd packages/client
          # Build will succeed but export may fail due to no team - that's OK
          pnpm tauri ios build --ci || true

      - name: Package IPA
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          mkdir -p Payload
          # Find .app in Xcode archive
          APP_PATH=$(find packages/client/src-tauri/gen/apple/build -name "*.app" -path "*/Products/Applications/*" 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found"
            find packages/client/src-tauri/gen/apple -name "*.app" 2>/dev/null || true
            find ~/Library/Developer/Xcode/Archives -name "*.app" 2>/dev/null || true
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r "Matrix_v${VERSION}.ipa" Payload

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifacts
          path: Matrix_v*.ipa

  create-release:
    needs: [build-mac, build-linux-server, build-ios]
    if: always() && needs.build-mac.result == 'success' && needs.build-linux-server.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect channel
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "PRERELEASE=true" >> $GITHUB_ENV
          else
            echo "PRERELEASE=false" >> $GITHUB_ENV
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts/

      - name: Update AltStore sources
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          # iOS bundle version must be pure X.Y.Z
          IOS_VERSION=$(echo "$VERSION" | sed 's/-.*//')
          IPA_NAME="Matrix_v${VERSION}.ipa"
          IPA_SIZE=$(stat -c%s "artifacts/${IPA_NAME}" 2>/dev/null || echo 0)
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${IPA_NAME}"
          DATE=$(date +%Y-%m-%d)

          # Always update beta source (use full version including pre-release suffix)
          BETA_ENTRY=$(jq -n \
            --arg v "$VERSION" \
            --arg bv "$IOS_VERSION" \
            --arg url "$DOWNLOAD_URL" \
            --arg size "$IPA_SIZE" \
            --arg date "$DATE" \
            '{
              "version": $v,
              "buildVersion": $bv,
              "date": $date,
              "downloadURL": $url,
              "size": ($size | tonumber),
              "minOSVersion": "16.0"
            }')
          jq --argjson entry "$BETA_ENTRY" \
            '.apps[0].versions = [$entry] + .apps[0].versions' \
            altstore-source-beta.json > tmp.json && mv tmp.json altstore-source-beta.json

          # Only update stable source for non-prerelease (use stripped IOS_VERSION)
          if [ "$PRERELEASE" = "false" ]; then
            STABLE_ENTRY=$(jq -n \
              --arg v "$IOS_VERSION" \
              --arg bv "$IOS_VERSION" \
              --arg url "$DOWNLOAD_URL" \
              --arg size "$IPA_SIZE" \
              --arg date "$DATE" \
              '{
                "version": $v,
                "buildVersion": $bv,
                "date": $date,
                "downloadURL": $url,
                "size": ($size | tonumber),
                "minOSVersion": "16.0"
              }')
            jq --argjson entry "$STABLE_ENTRY" \
              '.apps[0].versions = [$entry] + .apps[0].versions' \
              altstore-source.json > tmp.json && mv tmp.json altstore-source.json
          fi

      - name: Commit AltStore source update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add altstore-source.json altstore-source-beta.json
          if [ "$PRERELEASE" = "true" ]; then
            git commit -m "chore: update AltStore beta source for ${{ github.ref_name }}" || true
          else
            git commit -m "chore: update AltStore source for ${{ github.ref_name }}" || true
          fi
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Create GitHub Release
        run: |
          PRERELEASE_FLAG=""
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            artifacts/* \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            $PRERELEASE_FLAG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
